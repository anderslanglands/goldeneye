[workspace]
name = "goldeneye"
platforms = ["linux-64", "win-64", "osx-arm64"]
channels = [
  "https://conda.anaconda.org/anderslanglands/label/test",
  "https://conda.anaconda.org/anderslanglands",
  "conda-forge",
]
channel-priority = "disabled"

[dependencies]
python = "3.11.*"
pytest = "*"
numpy = "*"
pillow = "*"
openusd-typhoon = "*"
rust = "1.96.*"
rust-std-wasm32-unknown-unknown = "*"
rattler-build = "*"

[pypi-dependencies]
flip-evaluator = "==1.7"
goldeneye = { path = ".", editable = true }

[tasks]
test = "pytest tests -q"
build-viewer-assets = "goldeneye build-viewer-assets"
build-conda = "rattler-build build --channel-priority disabled --recipe recipe --output-dir _conda-channel --channel https://conda.anaconda.org/anderslanglands/label/test --channel https://conda.anaconda.org/anderslanglands --channel conda-forge"
